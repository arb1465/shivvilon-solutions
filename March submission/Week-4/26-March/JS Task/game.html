<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div> 
            <h1>Tic Tac Toe</h1>
            <div class="container">
                <div class="game">
                    <button class="box b0"></button>
                    <button class="box b1"></button>
                    <button class="box b2"></button>
                    <button class="box b3"></button>
                    <button class="box b4"></button>
                    <button class="box b5"></button>
                    <button class="box b6"></button>
                    <button class="box b7"></button>
                    <button class="box b8"></button>
                </div>
                <div>
                    <div class="score-card">
                        <span class="players" id="p-1"></span>
                        <span class="players" id="p-2"></span>
                    </div>
                    <div class="winnerName hide">
                        <p id="msg"> Winner is : </p>
                        <button id="go-back">Back</button>
                    </div>
                </div>
                <br>
            </div>
            <button id="reset">New Game</button>
        </div>
    </main>
    <script src="./game.js"></script>
</body>

</html>
